server.port=8080
spring.application.name=microservicio-orden
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

external.servicio-producto.api.base-url = localhost:8082/api/v1/orden
external.servicio-cliente.api.base-url = https://nonstack-clientes-back.onrender.com/api/v1/cliente 
external.servicio-sucursal.api.base-url = localhost:8083/api/v1/sucursal